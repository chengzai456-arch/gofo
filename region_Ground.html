<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>考勤分析 - Ground项目部</title>
<style>
/* ========== Font & Reset ========== */
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: #080c14;
  color: #e2e8f0;
  display: flex; min-height: 100vh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
  position: relative;
}
body::before {
  content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background:
    radial-gradient(ellipse 80% 60% at 50% 50%, rgba(30,58,138,0.18) 0%, transparent 70%),
    radial-gradient(ellipse 50% 40% at 20% 80%, rgba(88,28,135,0.10) 0%, transparent 60%),
    radial-gradient(ellipse 40% 50% at 80% 20%, rgba(15,118,110,0.08) 0%, transparent 55%),
    linear-gradient(180deg, #080c14 0%, #0c1220 30%, #0a0f1a 60%, #080c14 100%);
  pointer-events: none; z-index: 0;
  animation: bgShift 20s ease-in-out infinite;
}
@keyframes bgShift {
  0%, 100% { opacity: 0.9; }
  25% { opacity: 1; }
  50% { opacity: 0.85; }
  75% { opacity: 0.95; }
}
a { text-decoration: none; color: inherit; }

/* ========== Three.js Canvas Background ========== */
#bgCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

/* ========== Canvas Stars Overlay (闪烁星空) ========== */
#starCanvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1; pointer-events: none;
}

/* ========== Sidebar (深色调) ========== */
.sidebar {
  width: 260px; min-width: 260px;
  background: linear-gradient(180deg, #111827 0%, #0f172a 100%);
  border-right: 1px solid rgba(255,255,255,0.06);
  color: #e5e7eb;
  display: flex; flex-direction: column;
  position: fixed; top: 0; left: 0; bottom: 0;
  overflow-y: auto; z-index: 100;
  box-shadow: 2px 0 20px rgba(0,0,0,0.3);
}
.sidebar-header {
  padding: 20px 20px; font-size: 15px; font-weight: 700; letter-spacing: -0.2px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0;
  background: inherit; z-index: 1; color: #f1f5f9;
}
.sidebar-header .logo {
  width: 34px; height: 34px; border-radius: 8px;
  background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%);
  color: #fff;
  display: flex; align-items: center; justify-content: center; font-size: 16px;
}
.sidebar-action {
  padding: 10px 14px; display: flex; justify-content: center;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.back-home-btn {
  display: flex; align-items: center; justify-content: center; gap: 6px;
  width: 100%; padding: 8px 0; border-radius: 10px;
  font-size: 12.5px; font-weight: 600; color: #93c5fd;
  background: rgba(59,130,246,0.12); border: 1px solid rgba(59,130,246,0.22);
  cursor: pointer; transition: all 0.25s ease; text-decoration: none; white-space: nowrap;
  letter-spacing: 0.5px;
}
.back-home-btn:hover {
  background: rgba(59,130,246,0.25); border-color: rgba(96,165,250,0.45);
  color: #bfdbfe; transform: translateY(-1px); box-shadow: 0 3px 12px rgba(59,130,246,0.18);
}
.sidebar-nav { flex: 1; padding: 10px 0; }
.nav-item {
  display: flex; align-items: center; padding: 10px 18px; cursor: pointer;
  transition: all 0.2s; font-size: 13.5px; font-weight: 500; user-select: none;
  margin: 1px 8px; border-radius: 8px; color: #cbd5e1;
}
.nav-item:hover { background: rgba(255,255,255,0.08); color: #f1f5f9; }
.nav-item.active { background: linear-gradient(135deg, #3b82f6 0%, #6366f1 100%); color: #ffffff; font-weight: 600; box-shadow: 0 2px 8px rgba(59,130,246,0.3); }
.nav-item .icon { margin-right: 10px; font-size: 15px; width: 20px; text-align: center; }
.nav-item .badge { margin-left: auto; background: rgba(255,255,255,0.1); padding: 2px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; color: #94a3b8; }
.nav-item.active .badge { background: rgba(255,255,255,0.2); color: #e2e8f0; }
.nav-item .arrow { margin-left: 6px; font-size: 10px; transition: transform 0.2s; opacity: 0.5; }
.nav-item.expanded .arrow { transform: rotate(90deg); opacity: 0.8; }

/* Status dot for sub-department tabs */
.status-dot {
  width: 7px; height: 7px; border-radius: 50%;
  margin-left: 6px; flex-shrink: 0;
}
.dot-green { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
.dot-yellow { background: #eab308; box-shadow: 0 0 6px rgba(234,179,8,0.5); }
.dot-red { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }

.sub-nav { display: none; }
.sub-nav.show { display: block; }
.sub-nav .nav-item { padding-left: 42px; font-size: 13px; }

/* ========== Main Content (暗色玻璃） ========== */
.main {
  margin-left: 260px; flex: 1; padding: 28px 32px;
  max-width: calc(100vw - 260px); overflow-x: hidden;
  position: relative; z-index: 1;
}

/* ========== Floating Button ========== */
.floating-btn {
  position: fixed; top: 22px; right: 28px; z-index: 300;
  display: flex; align-items: center; gap: 8px;
  padding: 9px 20px; border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.10); cursor: grab;
  font-size: 13px; font-weight: 600; color: #e2e8f0; letter-spacing: 0.1px;
  background: rgba(15,20,35,0.70);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 2px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04);
  transition: all 0.3s ease;
  user-select: none; touch-action: none;
}
.floating-btn.dragging { cursor: grabbing; opacity: 0.9; transition: none; }
.floating-btn:hover {
  background: rgba(30,40,70,0.85); color: #fff;
  border-color: rgba(255,255,255,0.20);
  box-shadow: 0 4px 28px rgba(0,0,0,0.5), 0 0 40px rgba(59,130,246,0.15);
  transform: translateY(-1px);
}
.floating-btn .btn-icon { font-size: 15px; }
.floating-btn .btn-arrow { margin-left: 4px; transition: transform 0.3s; }
.floating-btn:hover .btn-arrow { transform: translateX(3px); }

/* ========== Page Header (暗色玻璃） ========== */
.page-header {
  background: rgba(15,20,40,0.65);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 22px 28px; margin-bottom: 22px;
  display: flex; justify-content: space-between; align-items: center;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.page-header h1 { font-size: 21px; font-weight: 700; color: #f1f5f9; letter-spacing: -0.3px; }
.page-header .meta { font-size: 13px; color: #94a3b8; font-weight: 500; }

/* ========== Cards Grid (暗色玻璃） ========== */
.cards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card {
  background: rgba(15,23,42,0.60);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 20px 22px;
  transition: all 0.25s; position: relative; overflow: hidden;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.card::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
  pointer-events: none;
}
.card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 8px 32px rgba(0,0,0,0.5);
}
.card.clickable { cursor: pointer; }
.card-title {
  font-size: 11.5px; color: #94a3b8;
  margin-bottom: 10px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.card-value {
  font-size: 28px; font-weight: 800; margin-bottom: 6px;
  line-height: 1.1; color: #f1f5f9;
}
.card-desc { font-size: 12px; color: #64748b; font-weight: 500; }

/* Card Status Accents (colored left border) */
.card.status-ok    { border-left: 3px solid #22c55e; }
.card.status-warn  { border-left: 3px solid #eab308; }
.card.status-bad   { border-left: 3px solid #ef4444; }
.card.neutral       { }

/* Status text colors */
.text-ok    { color: #22c55e !important; }
.text-warn  { color: #eab308 !important; }
.text-bad   { color: #ef4444 !important; }

/* ========== Chart Container (暗色玻璃） ========== */
.chart-wrap {
  background: rgba(15,23,42,0.60);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 24px 28px; margin-bottom: 22px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.chart-wrap h3 { font-size: 15px; font-weight: 700; margin-bottom: 18px; color: #f1f5f9; letter-spacing: -0.2px; }
.chart-wrap canvas { max-height: 380px; }

/* ========== Table (暗色玻璃） ========== */
.table-wrap {
  background: rgba(15,23,42,0.60);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px;
  padding: 24px 28px; margin-bottom: 22px; overflow-x: auto;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.table-wrap h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #f1f5f9; letter-spacing: -0.2px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th {
  background: rgba(30,41,59,0.50); padding: 11px 12px; text-align: center;
  font-weight: 600; font-size: 11.5px; text-transform: uppercase; letter-spacing: 0.4px;
  color: #94a3b8; border-bottom: 1px solid rgba(255,255,255,0.06); white-space: nowrap;
}
td {
  padding: 9px 12px; text-align: center;
  border-bottom: 1px solid rgba(255,255,255,0.03);
  color: #cbd5e1;
}
tr:hover td { background: rgba(255,255,255,0.03); }
tr.summary td {
  background: rgba(255,255,255,0.04);
  font-weight: 700; color: #f1f5f9;
  border-top: 1px solid rgba(255,255,255,0.06);
}
.drill-link {
  color: #60a5fa; cursor: pointer; font-weight: 600;
  transition: color 0.2s;
}
.drill-link:hover { color: #93c5fd; text-decoration: underline; }
.expand-row {
  cursor: pointer; color: #60a5fa; font-weight: 600;
  transition: color 0.2s;
}
.expand-row:hover { color: #93c5fd; text-decoration: underline; }

/* ========== Modal (暗色玻璃） ========== */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.60); z-index: 200;
  justify-content: center; align-items: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.modal-overlay.show { display: flex; }
.modal {
  background: rgba(15,23,42,0.85);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 18px;
  width: 92%; max-width: 1000px; max-height: 84vh;
  display: flex; flex-direction: column;
  box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  animation: modalIn 0.22s ease-out;
}
@keyframes modalIn { from { transform: scale(0.95) translateY(8px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
.modal-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 18px 26px; border-bottom: 1px solid rgba(255,255,255,0.06);
}
.modal-header h3 { font-size: 17px; font-weight: 700; color: #f1f5f9; }
.modal-close {
  background: rgba(255,255,255,0.06); border: none; width: 30px; height: 30px;
  border-radius: 50%; font-size: 15px; cursor: pointer; color: #94a3b8;
  display: flex; align-items: center; justify-content: center; transition: all 0.2s;
}
.modal-close:hover { background: rgba(255,255,255,0.12); color: #f1f5f9; }
.modal-body { padding: 18px 26px; overflow-y: auto; flex: 1; }
.modal-body .summary-line { font-size: 13px; color: #94a3b8; margin-bottom: 14px; }
.modal-body table { font-size: 12px; }
.modal-body th {
  position: sticky; top: 0;
  background: rgba(30,41,59,0.50);
  z-index: 1; color: #94a3b8;
}
.modal-body td { color: #cbd5e1; }

/* Empty / Loading */
.empty { text-align: center; padding: 60px 20px; color: #64748b; font-size: 15px; }
.loading { text-align: center; padding: 100px 20px; color: #64748b; font-size: 16px; }
.loading-spinner {
  display: inline-block; width: 40px; height: 40px;
  border: 3px solid rgba(255,255,255,0.06); border-top-color: rgba(59,130,246,0.5);
  border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 18px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.25); }

/* ========== Floating Action Buttons (右下角) ========== */
.fab-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 350;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: auto;
}
.fab-btn {
  display: flex; align-items: center; gap: 7px;
  padding: 10px 18px; border-radius: 50px;
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer; font-size: 12.5px; font-weight: 600;
  color: #cbd5e1; letter-spacing: 0.1px;
  background: rgba(15,20,40,0.55);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05),
    0 0 0 1px rgba(255,255,255,0.03) inset;
  transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
  user-select: none; white-space: nowrap;
}
.fab-btn:hover {
  background: rgba(30,45,80,0.75); color: #fff;
  border-color: rgba(255,255,255,0.22);
  box-shadow: 0 6px 32px rgba(0,0,0,0.5), 0 0 28px rgba(59,130,246,0.12);
  transform: translateY(-2px) scale(1.02);
}
.fab-btn:active { transform: translateY(0) scale(0.98); }
.fab-btn .fab-icon { font-size: 14px; line-height: 1; }
.fab-btn .fab-toast {
  position: absolute; top: -36px; left: 50%; transform: translateX(-50%);
  background: rgba(34,197,94,0.9); color: #fff; font-size: 11px;
  padding: 4px 12px; border-radius: 6px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.fab-btn .fab-toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 900px) {
  .sidebar { width: 220px; min-width: 220px; }
  .main { margin-left: 220px; padding: 20px; }
  .cards-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 12px; }
  .floating-btn { top: 14px; right: 14px; padding: 8px 14px; font-size: 12px; }
  .fab-container { bottom: 16px; right: 16px; gap: 8px; }
  .fab-btn { padding: 8px 14px; font-size: 11.5px; }
}
</style>

<script>
(function(){'use strict';
var SSO_BACKEND_URL='http://localhost:3000';
var LOGIN_PAGE='login.html';
var PAGE_REGION='Ground';

async function _auth_check(){
 var t=localStorage.getItem('token');
 if(!t){window.location.href=LOGIN_PAGE;return;}
 try{
  var r=await fetch(SSO_BACKEND_URL+'/api/auth/me',{headers:{'Authorization':'Bearer '+t}});
  if(r.ok){
   var u=await r.json();
   localStorage.setItem('user',JSON.stringify(u));
   if(PAGE_REGION&&u.pages&&u.pages.indexOf(PAGE_REGION)===-1){_auth_forbidden(u.name||'?',PAGE_REGION);return;}
   window.__AUTH_USER__=u;
  }
 }catch(e){console.warn('[Auth] 后端不可达:',e.message);}
 window.dispatchEvent(new CustomEvent('auth:done'));
}
 try{
  var r=await fetch(SSO_BACKEND_URL+'/api/auth/me',{headers:{'Authorization':'Bearer '+t}});
  if(r.ok){
  var u=await r.json();
  localStorage.setItem('user',JSON.stringify(u));
  if(PAGE_REGION&&u.pages&&u.pages.indexOf(PAGE_REGION)===-1){_auth_forbidden(u.name||'?',PAGE_REGION);return;}
  window.__AUTH_USER__=u;
  window.dispatchEvent(new CustomEvent('auth:ready',{detail:u}));
 }catch(e){
  console.warn('[Auth] 后端不可达:',e.message);
  window.dispatchEvent(new CustomEvent('auth:offline',{detail:{error:e.message}}));
 }
}
function _auth_redirect(){
 var cp=window.location.pathname.split('/').pop()||'';
 if(cp===LOGIN_PAGE)return;
 window.location.href=LOGIN_PAGE;
}
function _auth_forbidden(nm,rg){
 document.body.innerHTML='<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#080c14,#0c1220,#0a0f1a);font-family:-apple-system,BlinkMacSystemFont,\'PingFang SC\',sans-serif;color:#f1f5f9;"><div style="text-align:center;padding:48px 40px;background:rgba(15,23,42,0.60);backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(239,68,68,0.20);max-width:420px;"><div style="font-size:48px;margin-bottom:16px;">🚫</div><h2 style="font-size:20px;margin-bottom:8px;color:#ef4444;">无访问权限</h2><p style="color:#94a3b8;font-size:14px;line-height:1.6;margin-bottom:20px;">'+_e(nm)+'，你没有访问 '+_e(rg)+' 大区数据的权限。<br>如需访问请联系管理员。</p><button onclick="location.href=\''+LOGIN_PAGE+'\'" style="background:rgba(148,163,184,0.15);color:#94a3b8;border:1px solid rgba(148,163,184,0.10);padding:8px 20px;border-radius:8px;cursor:pointer;font-size:13px;">返回登录页</button></div></div>';
}
function _e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
document.documentElement.style.visibility='hidden';
_auth_check().finally(function(){document.documentElement.style.visibility='';});
window.__AUTH__={SSO_BACKEND_URL:SSO_BACKEND_URL,getUser:function(){return window.__AUTH_USER__;},getToken:function(){return localStorage.getItem('token');},logout:function(){localStorage.removeItem('token');localStorage.removeItem('user');window.location.href=LOGIN_PAGE;},isAdmin:function(){return window.__AUTH_USER__&&window.__AUTH_USER__.role==='admin';},canAccess:function(r){return window.__AUTH_USER__&&window.__AUTH_USER__.pages&&window.__AUTH_USER__.pages.indexOf(r)!==-1;}};
})();
</script>

<body>

<!-- Three.js Background Canvas -->
<canvas id="bgCanvas"></canvas>
<canvas id="starCanvas"></canvas>

<!-- Floating Button (双击打开飞书，单击拖动) -->
<a class="floating-btn" title="双击查看原始数据明细（可拖动）">
  <span class="btn-icon">&#x1F50D;</span>查看具体明细<span class="btn-arrow">&#x2192;</span>

    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ========== FAB Buttons (右下角) ========== -->
<div class="fab-container">
  <div class="fab-btn" id="fabDownload" onclick="downloadImage()">
    <span class="fab-icon">&#x1F4CE;</span>下载图片
    <span class="fab-toast" id="downloadToast">已保存</span>
  </div>
  <div class="fab-btn" id="fabShare" onclick="shareUrl()">
    <span class="fab-icon">&#x1F517;</span>分享网址
    <span class="fab-toast" id="shareToast">已复制</span>
  </div>
</div>

<script>
// ========== Three.js Background: Earth + Star Particles ==========
(function() {
  var canvas = document.getElementById('bgCanvas');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  window.addEventListener('resize', function() {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });

  var scene = new THREE.Scene();
  var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 9.5;

  // -- Mouse tracking for parallax --
  var mouseX = 0, mouseY = 0;
  var targetMX = 0, targetMY = 0;
  document.addEventListener('mousemove', function(e) {
    mouseX = (e.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
  });
  // Touch support
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length > 0) {
      mouseX = (e.touches[0].clientX / window.innerWidth) * 2 - 1;
      mouseY = -(e.touches[0].clientY / window.innerHeight) * 2 + 1;
    }
  }, { passive: true });

  // -- Earth group (for parallax) --
  var earthGroup = new THREE.Group();
  scene.add(earthGroup);

  // -- Earth Core --
  var earthGeo = new THREE.SphereGeometry(3.0, 72, 72);
  var earthMat = new THREE.MeshPhongMaterial({
    color: 0x0a0a2e,
    emissive: 0x080830,
    emissiveIntensity: 0.3,
    specular: 0x4444aa,
    shininess: 10,
  });
  var earth = new THREE.Mesh(earthGeo, earthMat);
  earthGroup.add(earth);

  // -- Wireframe overlay --
  var wireGeo = new THREE.SphereGeometry(3.04, 48, 48);
  var wireMat = new THREE.MeshBasicMaterial({
    color: 0x334488,
    wireframe: true,
    transparent: true,
    opacity: 0.25
  });
  var wireframe = new THREE.Mesh(wireGeo, wireMat);
  earthGroup.add(wireframe);

  // -- Globe glow dots --
  var dotsCount = 3000;
  var dotsGeo = new THREE.BufferGeometry();
  var dotsPositions = new Float32Array(dotsCount * 3);
  var dotsColors = new Float32Array(dotsCount * 3);
  var radius = 3.1;
  for (var i = 0; i < dotsCount; i++) {
    var theta = Math.random() * Math.PI * 2;
    var phi = Math.acos(2 * Math.random() - 1);
    dotsPositions[i*3] = radius * Math.sin(phi) * Math.cos(theta);
    dotsPositions[i*3+1] = radius * Math.sin(phi) * Math.sin(theta);
    dotsPositions[i*3+2] = radius * Math.cos(phi);
    dotsColors[i*3] = 0.15 + Math.random() * 0.25;
    dotsColors[i*3+1] = 0.2 + Math.random() * 0.3;
    dotsColors[i*3+2] = 0.5 + Math.random() * 0.5;
  }
  dotsGeo.setAttribute('position', new THREE.BufferAttribute(dotsPositions, 3));
  dotsGeo.setAttribute('color', new THREE.BufferAttribute(dotsColors, 3));
  var dotsMat = new THREE.PointsMaterial({
    size: 0.015,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.8,
    sizeAttenuation: true
  });
  var dots = new THREE.Points(dotsGeo, dotsMat);
  dots.name = 'globeDots';
  earthGroup.add(dots);

  // -- Orbiting Rings --
  function createRing(color, radiusVal, opacity, tiltX, tiltY, speed) {
    var ringGeo = new THREE.TorusGeometry(radiusVal, 0.015, 16, 150);
    var ringMat = new THREE.MeshBasicMaterial({
      color: color,
      transparent: true,
      opacity: opacity,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
    });
    var ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = tiltX;
    ring.rotation.y = tiltY;
    ring.userData = { speed: speed };
    return ring;
  }

  var ring1 = createRing(0x6644cc, 3.8, 0.35, Math.PI * 0.42, Math.PI * 0.15, 0.0012);
  var ring2 = createRing(0x4488cc, 4.3, 0.25, Math.PI * 0.58, -Math.PI * 0.2, -0.0008);
  var ring3 = createRing(0x8866dd, 4.8, 0.15, Math.PI * 0.35, Math.PI * 0.3, 0.0015);
  earthGroup.add(ring1); earthGroup.add(ring2); earthGroup.add(ring3);

  // -- Earth glow aura (subtle outer ring) --
  var glowGeo = new THREE.SphereGeometry(3.4, 32, 32);
  var glowMat = new THREE.ShaderMaterial({
    uniforms: {
      uTime: { value: 0 },
      uColor: { value: new THREE.Color(0x334488) }
    },
    vertexShader: `
      varying vec3 vNormal; varying vec3 vPosition;
      void main() {
        vNormal = normalize(normalMatrix * normal);
        vPosition = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vNormal; varying vec3 vPosition;
      uniform float uTime; uniform vec3 uColor;
      void main() {
        float intensity = pow(0.65 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 2.5);
        float pulse = 1.0 + sin(uTime * 0.5) * 0.15;
        gl_FragColor = vec4(uColor, intensity * 0.12 * pulse);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });
  var glowMesh = new THREE.Mesh(glowGeo, glowMat);
  earthGroup.add(glowMesh);

  // -- Elegant Nebula Particles (replaces stars + float) --
  var nebulaCount = 2000;
  var nebulaGeo = new THREE.BufferGeometry();
  var nebulaPos = new Float32Array(nebulaCount * 3);
  var nebulaCol = new Float32Array(nebulaCount * 3);
  var nebulaSizes = new Float32Array(nebulaCount);
  for (var n = 0; n < nebulaCount; n++) {
    // Spiral distribution for galaxy feel
    var t2 = Math.random() * Math.PI * 2;
    var dist = Math.pow(Math.random(), 1.8) * 18;
    var spiralOffset = dist * 0.3;
    var angle = t2 + spiralOffset;
    var heightRand = (Math.random() - 0.5) * dist * 0.35;
    nebulaPos[n*3] = Math.cos(angle) * dist + (Math.random() - 0.5) * 2;
    nebulaPos[n*3+1] = heightRand;
    nebulaPos[n*3+2] = Math.sin(angle) * dist + (Math.random() - 0.5) * 2 - 2;
    // Blue-purple-teal color palette
    var palette = Math.random();
    if (palette < 0.4) {
      nebulaCol[n*3] = 0.25; nebulaCol[n*3+1] = 0.35; nebulaCol[n*3+2] = 0.75;
    } else if (palette < 0.7) {
      nebulaCol[n*3] = 0.45; nebulaCol[n*3+1] = 0.25; nebulaCol[n*3+2] = 0.65;
    } else if (palette < 0.9) {
      nebulaCol[n*3] = 0.15; nebulaCol[n*3+1] = 0.55; nebulaCol[n*3+2] = 0.55;
    } else {
      nebulaCol[n*3] = 0.65; nebulaCol[n*3+1] = 0.55; nebulaCol[n*3+2] = 0.35;
    }
    nebulaSizes[n] = Math.random() * 0.06 + 0.015;
  }
  nebulaGeo.setAttribute('position', new THREE.BufferAttribute(nebulaPos, 3));
  nebulaGeo.setAttribute('color', new THREE.BufferAttribute(nebulaCol, 3));
  nebulaGeo.setAttribute('size', new THREE.BufferAttribute(nebulaSizes, 1));

  // Softer particle texture
  function createNebulaTexture() {
    var c2 = document.createElement('canvas');
    c2.width = 64; c2.height = 64;
    var ctx2 = c2.getContext('2d');
    var g2 = ctx2.createRadialGradient(32, 32, 0, 32, 32, 32);
    g2.addColorStop(0, 'rgba(255,255,255,1)');
    g2.addColorStop(0.05, 'rgba(255,255,255,0.9)');
    g2.addColorStop(0.2, 'rgba(180,200,255,0.5)');
    g2.addColorStop(0.5, 'rgba(80,100,200,0.08)');
    g2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx2.fillStyle = g2;
    ctx2.fillRect(0, 0, 64, 64);
    return new THREE.CanvasTexture(c2);
  }

  var nebulaTex = createNebulaTexture();
  var nebulaMat = new THREE.PointsMaterial({
    size: 0.08,
    map: nebulaTex,
    vertexColors: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.55,
    sizeAttenuation: true,
  });
  var nebula = new THREE.Points(nebulaGeo, nebulaMat);
  nebula.name = 'nebulaBg';
  scene.add(nebula);

  // -- Subtle floating light motes (very few, elegant) --
  var lightMotesCount = 120;
  var motesGeo = new THREE.BufferGeometry();
  var motesPos = new Float32Array(lightMotesCount * 3);
  var motesVel = [];
  for (var m = 0; m < lightMotesCount; m++) {
    motesPos[m*3] = (Math.random() - 0.5) * 20;
    motesPos[m*3+1] = (Math.random() - 0.5) * 14;
    motesPos[m*3+2] = (Math.random() - 0.5) * 12 - 3;
    motesVel.push({
      vx: (Math.random() - 0.5) * 0.003,
      vy: (Math.random() - 0.5) * 0.002 + 0.002,
      vz: (Math.random() - 0.5) * 0.002,
      phase: Math.random() * Math.PI * 2,
    });
  }
  motesGeo.setAttribute('position', new THREE.BufferAttribute(motesPos, 3));
  var motesMat = new THREE.PointsMaterial({
    size: 0.04,
    map: nebulaTex,
    color: 0xaaccff,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
    transparent: true,
    opacity: 0.45,
    sizeAttenuation: true,
  });
  var motes = new THREE.Points(motesGeo, motesMat);
  motes.name = 'lightMotes';
  motes.userData = { velocities: motesVel };
  scene.add(motes);

  // -- Lighting --
  var ambientLight = new THREE.AmbientLight(0x223366, 0.8);
  scene.add(ambientLight);
  var pointLight1 = new THREE.PointLight(0x4466cc, 1.5, 10);
  pointLight1.position.set(3, 2, 4);
  scene.add(pointLight1);
  var pointLight2 = new THREE.PointLight(0x6644aa, 1.0, 8);
  pointLight2.position.set(-3, -2, 2);
  scene.add(pointLight2);

  // -- Animate --
  var clock = new THREE.Clock();
  function animate() {
    requestAnimationFrame(animate);
    var dt = Math.min(clock.getDelta(), 0.1);
    var t = performance.now() * 0.001;

    // Mouse parallax - smooth follow
    targetMX += (mouseX - targetMX) * 0.03;
    targetMY += (mouseY - targetMY) * 0.03;
    earthGroup.position.x = targetMX * 1.2;
    earthGroup.position.y = targetMY * 0.8;

    // Earth + rings rotation
    earth.rotation.y += 0.002;
    wireframe.rotation.y += 0.003;
    wireframe.rotation.x += 0.0005;
    dots.rotation.y += 0.0025;
    dots.rotation.x += 0.0008;

    ring1.rotation.z += ring1.userData.speed;
    ring2.rotation.z += ring2.userData.speed;
    ring3.rotation.z += ring3.userData.speed;

    // Glow shader time uniform
    glowMat.uniforms.uTime.value = t;

    // Subtle nebula rotation
    nebula.rotation.y += 0.0003;
    nebula.rotation.x += 0.0001;

    // Elegant light motes
    if (motes && motes.userData.velocities) {
      var mpArr = motes.geometry.attributes.position.array;
      var mvs = motes.userData.velocities;
      for (var mi = 0; mi < mvs.length; mi++) {
        var mv = mvs[mi];
        mpArr[mi*3] += mv.vx;
        mpArr[mi*3+1] += mv.vy;
        mpArr[mi*3+2] += mv.vz;
        // Wrap around
        if (Math.abs(mpArr[mi*3]) > 10) mpArr[mi*3] *= -0.9;
        if (Math.abs(mpArr[mi*3+1]) > 7) mpArr[mi*3+1] *= -0.9;
        if (Math.abs(mpArr[mi*3+2]) > 6) mpArr[mi*3+2] *= -0.9;
      }
      motes.geometry.attributes.position.needsUpdate = true;
      motes.material.opacity = 0.35 + Math.sin(t * 1.2) * 0.1;
    }

    renderer.render(scene, camera);
  }
  animate();
})();

// ========== Canvas 2D Stars: 420颗恒星 + 流星系统 + 流星雨爆发 ==========
(function() {
  var starCanvas = document.getElementById('starCanvas');
  if (!starCanvas) return;
  var ctx = starCanvas.getContext('2d');
  var W, H, stars = [];
  var STAR_COUNT = 420;
  var dpr = window.devicePixelRatio || 1;

  // ===== 颜色库 =====
  // 恒星5色
  var STAR_COLORS = [
    { r: 1.0, g: 1.0, b: 1.0 },            // 白
    { r: 0.75, g: 0.88, b: 1.0 },          // 淡蓝
    { r: 0.35, g: 0.88, b: 1.0 },          // 青色
    { r: 0.72, g: 0.6, b: 0.93 },           // 薰衣草紫
    { r: 1.0, g: 0.88, b: 0.55 },           // 暖金
  ];
  // 流星6色 (RGBA数组)
  var METEOR_COLORS = [
    { r:135, g:206, b:250 },   // 冰蓝
    { r:0, g:210, b:220 },      // 青色
    { r:138, g:100, b:200 },    // 紫罗兰
    { r:255, g:200, b:60 },     // 金色
    { r:50, g:205, b:120 },     // 翠绿
    { r:255, g:95, b:50 },      // 红橙
  ];

  function resize() {
    W = starCanvas.width = window.innerWidth * dpr;
    H = starCanvas.height = window.innerHeight * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    W = window.innerWidth; H = window.innerHeight;
  }

  // ===== 初始化恒星 =====
  function initStars() {
    stars = [];
    for (var i = 0; i < STAR_COUNT; i++) {
      // 层次感: 三档亮度
      var layerRand = Math.random();
      var baseRadius, depthAlpha, speedRange;
      if (layerRand < 0.52) {
        // 远景: 小而暗 (52%)
        baseRadius = 0.3 + Math.random() * 0.5;       // 0.3 ~ 0.8
        depthAlpha = 0.18 + Math.random() * 0.22;      // 0.18 ~ 0.40
        speedRange = [0.3, 1.4];
      } else if (layerRand < 0.84) {
        // 中景: 中等 (32%)
        baseRadius = 0.7 + Math.random() * 0.9;        // 0.7 ~ 1.6
        depthAlpha = 0.42 + Math.random() * 0.25;      // 0.42 ~ 0.67
        speedRange = [0.6, 2.0];
      } else {
        // 近景: 大而亮 (16%)
        baseRadius = 1.4 + Math.random() * 1.4;        // 1.4 ~ 2.8
        depthAlpha = 0.62 + Math.random() * 0.33;      // 0.62 ~ 0.95
        speedRange = [0.8, 2.4];
      }

      // 从5种颜色中随机选一色
      var colorIdx = Math.floor(Math.random() * STAR_COLORS.length);
      // 45%概率选白色(索引0)，其余均匀分配
      if (Math.random() < 0.45) colorIdx = 0;

      var sp = speedRange[0] + Math.random() * (speedRange[1] - speedRange[0]);
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        radius: baseRadius,
        baseAlpha: depthAlpha,
        color: STAR_COLORS[colorIdx],
        phase: Math.random() * Math.PI * 2,
        speed: sp,
        ampMin: 0.10 + Math.random() * 0.20,
        ampMax: 0.82 + Math.random() * 0.18,
        hasCross: layerRand >= 0.84 && baseRadius > 1.4 && Math.random() > 0.35,
        crossLen: 0,
      });
      if (stars[stars.length - 1].hasCross) {
        stars[stars.length - 1].crossLen = baseRadius * (3.5 + Math.random() * 4);
      }
    }
  }

  resize();
  initStars();
  window.addEventListener('resize', function() { resize(); initStars(); });

  // ===== 绘制单颗恒星 =====
  function drawStar(s, alpha) {
    var a = Math.max(0, Math.min(1, alpha));
    var c = s.color;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.radius, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(' + Math.round(c.r*255) + ',' + Math.round(c.g*255) + ',' +
                      Math.round(c.b*255) + ',' + a.toFixed(3) + ')';
    ctx.fill();

    // 十字光芒（近景大星）
    if (s.hasCross && a > 0.38) {
      var cl = s.crossLen;
      var ca = a * 0.28;
      // 外发光层
      ctx.strokeStyle = 'rgba(' + Math.round(c.r*255) + ',' + Math.round(c.g*255) + ',' +
                            Math.round(c.b*255) + ',' + (ca * 0.5).toFixed(3) + ')';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.moveTo(s.x - cl * 1.3, s.y); ctx.lineTo(s.x + cl * 1.3, s.y);
      ctx.moveTo(s.x, s.y - cl * 1.3); ctx.lineTo(s.x, s.y + cl * 1.3);
      ctx.stroke();
      // 内亮线
      ctx.strokeStyle = 'rgba(' + Math.round(c.r*255) + ',' + Math.round(c.g*255) + ',' +
                            Math.round(c.b*255) + ',' + ca.toFixed(3) + ')';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(s.x - cl, s.y); ctx.lineTo(s.x + cl, s.y);
      ctx.moveTo(s.x, s.y - cl); ctx.lineTo(s.x, s.y + cl);
      ctx.stroke();
    }
  }

  // ===== 流星类 =====
  var meteors = [];

  function createMeteor(isBurst) {
    // 起点: 屏幕上方或右侧边缘
    var fromTop = Math.random() > 0.35;
    var sx, sy, angle;
    if (fromTop) {
      sx = Math.random() * W * 0.9;
      sy = -10;
    } else {
      sx = W + 10;
      sy = Math.random() * H * 0.4;
    }
    // 角度: 25~65度 (从右上到左下)
    angle = (25 + Math.random() * 40) * Math.PI / 180;
    // 速度
    var speed = isBurst ? (8 + Math.random() * 8) : (6 + Math.random() * 7);
    // 颜色
    var cIdx = isBurst
      ? Math.floor(Math.random() * METEOR_COLORS.length)
      : Math.floor(Math.random() * 2); // 普通流星只用冰蓝/青
    var mc = METEOR_COLORS[cIdx];
    // 拖尾长度
    var tailLen = isBurst ? (80 + Math.random() * 100) : (60 + Math.random() * 80);

    return {
      x: sx, y: sy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      tail: tailLen,
      life: 1.0,
      decay: isBurst ? (0.012 + Math.random() * 0.01) : (0.008 + Math.random() * 0.008),
      color: mc,
      thickness: isBurst ? (2 + Math.random() * 1.5) : (1.5 + Math.random() * 1),
      headGlow: 4 + Math.random() * 4,
    };
  }

  function updateAndDrawMeteor(m) {
    m.x += m.vx;
    m.y += m.vy;
    m.life -= m.decay;

    if (m.life <= 0 || m.x < -150 || m.y > H + 150) return false;

    // 计算拖尾端点
    var tailX = m.x - (m.vx / Math.sqrt(m.vx*m.vx + m.vy*m.vy)) * m.tail * m.life;
    var tailY = m.y - (m.vy / Math.sqrt(m.vx*m.vx + m.vy*m.vy)) * m.tail * m.life;

    var grad = ctx.createLinearGradient(tailX, tailY, m.x, m.y);
    var mc = m.color;
    grad.addColorStop(0, 'rgba(' + mc.r + ',' + mc.g + ',' + mc.b + ',0)');
    grad.addColorStop(0.5, 'rgba(' + mc.r + ',' + mc.g + ',' + mc.b + ',' + (m.life * 0.35).toFixed(3) + ')');
    grad.addColorStop(1, 'rgba(' + mc.r + ',' + mc.g + ',' + mc.b + ',' + (m.life * 0.95).toFixed(3) + ')');

    ctx.save();
    ctx.lineCap = 'round';
    ctx.lineWidth = m.thickness * m.life;
    ctx.strokeStyle = grad;
    ctx.beginPath();
    ctx.moveTo(tailX, tailY);
    ctx.lineTo(m.x, m.y);
    ctx.stroke();

    // 头部发光
    if (m.headGlow > 0 && m.life > 0.3) {
      var hgR = m.headGlow * m.life;
      var hGlow = ctx.createRadialGradient(m.x, m.y, 0, m.x, m.y, hgR);
      hGlow.addColorStop(0, 'rgba(' + mc.r + ',' + mc.g + ',' + mc.b + ',' + (m.life * 0.9).toFixed(3) + ')');
      hGlow.addColorStop(0.3, 'rgba(' + mc.r + ',' + mc.g + ',' + mc.b + ',' + (m.life * 0.4).toFixed(3) + ')');
      hGlow.addColorStop(1, 'rgba(' + mc.r + ',' + mc.g + ',' + mc.b + ',0)');
      ctx.fillStyle = hGlow;
      ctx.beginPath();
      ctx.arc(m.x, m.y, hgR, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();

    return true;
  }

  // ===== 普通流星定时器 (每2-5秒) =====
  function scheduleNormalMeteor() {
    var delay = 2000 + Math.random() * 3000;
    setTimeout(function() {
      meteors.push(createMeteor(false));
      scheduleNormalMeteor();
    }, delay);
  }

  // ===== 流星雨爆发定时器 (每0.7-2.8秒，12%双发) =====
  function scheduleBurstMeteor() {
    var delay = 700 + Math.random() * 2100;
    setTimeout(function() {
      meteors.push(createMeteor(true));
      if (Math.random() < 0.12) {
        // 双发: 第二颗略微偏移
        setTimeout(function() { meteors.push(createMeteor(true)); }, 80 + Math.random() * 120);
      }
      scheduleBurstMeteor();
    }, delay);
  }

  // 启动定时器
  scheduleNormalMeteor();
  scheduleBurstMeteor();

  // ===== 动画循环 =====
  var tStart = performance.now();
  function animateStars() {
    ctx.clearRect(0, 0, W * dpr, H * dpr);
    var now = performance.now();
    var elapsed = (now - tStart) * 0.001;

    // 绘制恒星
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var breath = Math.sin(elapsed * s.speed + s.phase);
      var alpha = s.baseAlpha * (s.ampMin + (s.ampMax - s.ampMin) * (breath * 0.5 + 0.5));
      drawStar(s, alpha);
    }

    // 更新和绘制流星

function downloadImage() {
  var toast = document.getElementById('downloadToast');
  // 使用 html2canvas 或原生方案: 将当前页面转为图片
  // 方案: 引入 html2canvas CDN 后截图
  if (typeof html2canvas === 'undefined') {
    // 动态加载 html2canvas
    var s = document.createElement('script');
    s.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    s.onload = function() {
      doCapture();
    };
    s.onerror = function() {
      toast.textContent = '加载失败';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    };
    document.head.appendChild(s);
  } else {
    doCapture();
  }

  function doCapture() {
    var mainEl = document.getElementById('mainContent');
    if (!mainEl) mainEl = document.body;
    html2canvas(mainEl, {
      backgroundColor: '#080c14',
      scale: 2,
      useCORS: true,
      logging: false,
      ignoreElements: function(el) {
        return el.classList && el.classList.contains('fab-container');
      },
    }).then(function(canvas) {
      var link = document.createElement('a');
      link.download = '考勤报告_' + new Date().toISOString().slice(0,10) + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
      toast.textContent = '已保存';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }).catch(function(err) {
      console.error('截图失败:', err);
      toast.textContent = '保存失败';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    });
  }
}

function shareUrl() {
  var toast = document.getElementById('shareToast');
  var url = window.location.href || document.URL || '';
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(function() {
      toast.textContent = '已复制';
      toast.classList.add('show');
      setTimeout(function() { toast.classList.remove('show'); }, 2000);
    }).catch(function() {
      fallbackCopy(url);
    });
  } else {
    fallbackCopy(url);
  }

  function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); toast.textContent = '已复制'; }
    catch(e) { toast.textContent = '复制失败'; }
    document.body.removeChild(ta);
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2000);
  }
}

// ========== Draggable Floating Button (双击打开, 单击拖动) ==========
(function() {
  var btn = document.querySelector('.floating-btn');
  if (!btn) return;
  var isDragging = false;
  var didDrag = false;
  var startX, startY, origLeft, origTop;

  function onStart(e) {
    if (e.type === 'touchstart') e.preventDefault();
    isDragging = true;
    didDrag = false;
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    startX = clientX;
    startY = clientY;
    var rect = btn.getBoundingClientRect();
    origLeft = rect.left;
    origTop = rect.top;
    btn.classList.add('dragging');
  }

  function onMove(e) {
    if (!isDragging) return;
    var clientX = e.touches ? e.touches[0].clientX : e.clientX;
    var clientY = e.touches ? e.touches[0].clientY : e.clientY;
    var dx = clientX - startX;
    var dy = clientY - startY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) didDrag = true;
    btn.style.left = (origLeft + dx) + 'px';
    btn.style.top = (origTop + dy) + 'px';
    btn.style.right = 'auto';
  }

  function onEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    btn.classList.remove('dragging');
  }

  btn.addEventListener('mousedown', onStart);
  btn.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);

  // 双击打开飞书
  btn.addEventListener('dblclick', function(e) {
    if (didDrag) return;
    e.preventDefault();
    window.open('https://acnjh1thgeif.feishu.cn/base/RgdCbpNrKaLiGmsBs2TcnTOCnYt?table=tblFwl3mZSW6yEOP&view=vewoYY8F16', '_blank');
  });

  // 单击不跳转(拖拽后单击也忽略)
  btn.addEventListener('click', function(e) {
    e.preventDefault();
  });
})();

// ========== Helpers ==========
function p2n(pctStr) { return parseFloat(pctStr) / 100; }
function fmtH(v) { v = parseFloat(v); return v > 0 ? v + 'h' : '-'; }

function statusClass(val, type) {
  var v = typeof val === 'number' ? val : p2n(val);
  if (type === 'miss') {
    if (v < 0.5) return 'text-ok';
    if (v < 0.9) return 'text-warn';
    return 'text-bad';
  }
  if (type === 'hub') {
    if (v >= 0.9) return 'text-ok';
    if (v >= 0.5) return 'text-warn';
    return 'text-bad';
  }
  if (type === 'schedule') {
    if (v >= 1.0) return 'text-ok';
    if (v >= 0.9) return 'text-warn';
    return 'text-bad';
  }
  if (v >= 0.9) return 'text-ok';
  if (v >= 0.5) return 'text-warn';
  return 'text-bad';
}

function cardStatusClass(val, type) {
  var v = typeof val === 'number' ? val : p2n(val);
  if (type === 'miss') {
    if (v < 0.5) return 'status-ok';
    if (v < 0.9) return 'status-warn';
    return 'status-bad';
  }
  if (type === 'hub') {
    if (v >= 0.9) return 'status-ok';
    if (v >= 0.5) return 'status-warn';
    return 'status-bad';
  }
  if (type === 'schedule') {
    if (v >= 1.0) return 'status-ok';
    if (v >= 0.9) return 'status-warn';
    return 'status-bad';
  }
  if (v >= 0.9) return 'status-ok';
  if (v >= 0.5) return 'status-warn';
  return 'status-bad';
}

function getDotClass(s) {
  var schedRate = p2n(s['排班']['排班率']);
  var correctRate = p2n(s['排班正确']['正确率']);
  var worst = 'ok';
  if (schedRate < 0.9 || correctRate < 0.5) worst = 'red';
  else if (schedRate < 1.0 || correctRate < 0.9) worst = 'yellow';
  return 'dot-' + worst;
}

// ========== Drill-down Data Store ==========
var drillStore = new Map();
var drillIdCounter = 0;

function registerDrill(title, employees) {
  var id = ++drillIdCounter;
  drillStore.set(id, { title: title, employees: employees });
  return id;
}

function drillBtn(label, employees) {
  if (!employees || employees.length === 0) return '<span style="color:#d1d5db">0</span>';
  var id = registerDrill(label, employees);
  return '<span class="drill-link" onclick="openDrill(' + id + ')">' + employees.length + ' &#x25B6;</span>';
}

function infoBtn(label, employees) {
  if (!employees || employees.length === 0) return '';
  var id = registerDrill(label, employees);
  return ' <span class="drill-link" onclick="openDrill(' + id + ')" style="font-size:11px">&#x1F4CB;</span>';
}

// ========== Card Component ==========
function metricCard(title, valStr, desc, statusCls, employees, cardCls) {
  var cardC = cardCls ? ' ' + cardCls : '';
  var drillEl = employees ? ' ' + drillBtn('', employees) : '';
  var valC = statusCls ? ' ' + statusCls : '';
  return '<div class="card' + cardC + '">' +
    '<div class="card-title">' + title + '</div>' +
    '<div class="card-value' + valC + '">' + valStr + drillEl + '</div>' +
    (desc ? '<div class="card-desc">' + desc + '</div>' : '') +
  '</div>';
}

// ========== Chart Helpers ==========
var chartColors = {
  green: '#22c55e',
  yellow: '#eab308',
  red: '#ef4444',
  blue: '#3b82f6',
  purple: '#8b5cf6',
  cyan: '#06b6d4',
  orange: '#f97316',
};
var chartInstances = {};

function destroyAllCharts() {
  Object.keys(chartInstances).forEach(function(k) {
    if (chartInstances[k]) { chartInstances[k].destroy(); delete chartInstances[k]; }
  });
}

function drawBarChart(canvasId, config) {
  var ctx = document.getElementById(canvasId);
  if (!ctx) return;
  if (chartInstances[canvasId]) chartInstances[canvasId].destroy();
  chartInstances[canvasId] = new Chart(ctx, {
    type: 'bar',
    data: config.data,
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: config.legend !== false, position: 'top',
          labels: { usePointStyle: true, padding: 20, font: { size: 12 }, color: '#94a3b8' }
        },
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 11 }, color: '#64748b' }
        },
        y: {
          beginAtZero: true, max: config.yMax || 100,
          grid: { color: 'rgba(255,255,255,0.05)' },
          ticks: { font: { size: 11 }, color: '#64748b', callback: function(v) { return v + '%'; } }
        }
      }
    }
  });
}

// ========== Render Sidebar ==========
function renderSidebar() {
  var nav = document.getElementById('sidebarNav');
  var html = '<div class="nav-item active" data-view="overview" onclick="showView(\'overview\')">' +
    '<span class="icon">&#x1F3E0;</span>全览<span class="badge">' + DATA.meta.total_employees + '人</span></div>';

  DATA.departments.forEach(function(dept, i) {
    var dId = 'dept-' + i;
    html += '<div class="nav-item" data-view="' + dId + '" onclick="toggleDept(\'' + dId + '\', event)">' +
      '<span class="icon">&#x1F5C2;</span>' + dept.name + '<span class="badge">' + dept.summary.total + '人</span>' +
      '<span class="arrow">&#x25B6;</span></div>';
    html += '<div class="sub-nav" id="sub-' + dId + '">';
    dept.sub_depts.forEach(function(sub, j) {
      var sId = dId + '-sub-' + j;
      var dotCls = getDotClass(sub.summary);
      html += '<div class="nav-item" data-view="' + sId + '" onclick="showView(\'' + sId + '\')">' +
        '<span class="icon">&#x1F4C3;</span>' + sub.name +
        '<span class="status-dot ' + dotCls + '"></span>' +
        '<span class="badge">' + sub.summary.total + '人</span></div>';
    });
    html += '</div>';
  });

  nav.innerHTML = html;
}

function toggleDept(dId, event) {
  event.stopPropagation();
  var item = event.currentTarget;
  var sub = document.getElementById('sub-' + dId);
  var isOpen = sub.classList.contains('show');
  if (isOpen) {
    sub.classList.remove('show');
    item.classList.remove('expanded');
  } else {
    sub.classList.add('show');
    item.classList.add('expanded');
  }
  showView(dId);
}

// ========== View Switching ==========
function showView(viewId) {
  destroyAllCharts();
  document.querySelectorAll('.nav-item').forEach(function(el) { el.classList.remove('active'); });
  var target = document.querySelector('[data-view="' + viewId + '"]');
  if (target) target.classList.add('active');

  if (viewId === 'overview') {
    renderOverview();
  } else if (viewId.startsWith('dept-') && viewId.indexOf('-sub-') === -1) {
    var idx = parseInt(viewId.split('-')[1]);
    renderDepartment(DATA.departments[idx]);
  } else if (viewId.indexOf('-sub-') !== -1) {
    var parts = viewId.split('-');
    var dIdx = parseInt(parts[1]);
    var sIdx = parseInt(parts[3]);
    renderSubDepartment(DATA.departments[dIdx], DATA.departments[dIdx].sub_depts[sIdx]);
  }
}

// ========== Drill-down Modal ==========
function openDrill(id) {
  var entry = drillStore.get(id);
  if (!entry) return;
  showDrilldown(entry.title, entry.employees);
}

function showDrilldown(title, employees) {
  document.getElementById('modalTitle').textContent = '\uD83D\uDCCA ' + title;
  var body = document.getElementById('modalBody');

  if (!employees || employees.length === 0) {
    body.innerHTML = '<div class="empty">暂无数据</div>';
  } else {
    var baseKeys = ['工号', '姓名', '三级部门', '四级部门', '五级部门'];
    var preferredOrder = ['班次名称', '班次上班时间', '班次下班时间', '首打卡时间', '末打卡时间', '超8H小时', '缺卡数', '班次内打卡次数', '标准打卡数', '是否排班正确', '是否排班'];
    var sample = employees[0];
    var extraKeys = [];
    for (var k in sample) {
      if (baseKeys.indexOf(k) === -1) extraKeys.push(k);
    }
    extraKeys.sort(function(a, b) {
      var idxA = preferredOrder.indexOf(a);
      var idxB = preferredOrder.indexOf(b);
      if (idxA === -1 && idxB === -1) return a.localeCompare(b);
      if (idxA === -1) return 1;
      if (idxB === -1) return -1;
      return idxA - idxB;
    });
    var allKeys = baseKeys.concat(extraKeys);

    var html = '<div class="summary-line">共 <strong>' + employees.length + '</strong> 人</div>';
    html += '<table><thead><tr>';
    allKeys.forEach(function(k) { html += '<th>' + k + '</th>'; });
    html += '</tr></thead><tbody>';

    employees.forEach(function(emp) {
      html += '<tr>';
      allKeys.forEach(function(k) {
        html += '<td>' + (emp[k] !== undefined ? emp[k] : '') + '</td>';
      });
      html += '</tr>';
    });

    html += '</tbody></table>';
    body.innerHTML = html;
  }

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeModal();
});

// ========== Initialize ==========
renderSidebar();
showView('overview');
</script>
