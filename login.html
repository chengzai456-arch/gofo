<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考勤晾晒平台 - 登录</title>
  <style>
    /* ══════════════════════════════════════════════════
       深暗主题玻璃态 — 与考勤报告风格一致
       ══════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #080c14;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      overflow: hidden;
    }

    /* ── 多层径向光晕背景 ── */
    .bg-aura {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .bg-aura::before,
    .bg-aura::after {
      content: ''; position: absolute;
      border-radius: 50%; filter: blur(120px); opacity: 0.15;
      animation: auraPulse 20s ease-in-out infinite;
    }
    .bg-aura::before {
      width: 800px; height: 800px;
      background: radial-gradient(circle, rgba(96,165,250,0.4), transparent);
      top: -200px; left: -100px;
    }
    .bg-aura::after {
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(168,85,247,0.3), transparent);
      bottom: -150px; right: -100px;
    }
    @keyframes auraPulse {
      0%, 100% { transform: scale(1) translate(0, 0); opacity: 0.12; }
      33%  { transform: scale(1.1) translate(30px, -20px); opacity: 0.18; }
      66%  { transform: scale(0.95) translate(-20px, 10px); opacity: 0.10; }
    }

    /* ── 星云粒子 Canvas ── */
    #particles-canvas {
      position: fixed; inset: 0; z-index: 0; opacity: 0.6;
    }

    /* ── 主容器 ── */
    .container {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 32px;
    }

    /* ── 玻璃拟态登录卡片 ── */
    .login-card {
      position: relative;
      width: 420px;
      padding: 48px 40px;
      background: rgba(15, 23, 42, 0.65);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 20px;
      border: 1px solid rgba(148, 163, 184, 0.10);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.40);
      text-align: center;
      transition: all 0.3s ease;
    }
    /* 顶部微光边框 */
    .login-card::before {
      content: ''; position: absolute; top: 0; left: 40px; right: 40px;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(96,165,250,0.4), rgba(168,85,247,0.4), transparent);
    }

    /* ── 图标 ── */
    .logo-icon {
      width: 64px; height: 64px;
      margin: 0 auto 20px;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
      box-shadow: 0 8px 32px rgba(59,130,246,0.25);
    }

    /* ── 标题 ── */
    h1 {
      font-size: 24px; font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    .subtitle {
      font-size: 14px; color: #64748b;
      margin-bottom: 36px;
      line-height: 1.6;
    }

    /* ── 飞书登录按钮 ── */
    .btn-feishu {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 12px;
      width: 100%; padding: 14px 24px;
      background: linear-gradient(135deg, #3370ff, #245bdb);
      color: #fff;
      font-size: 16px; font-weight: 500;
      border: none; border-radius: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.25s ease;
      box-shadow: 0 4px 20px rgba(51,112,255,0.30);
      position: relative;
      overflow: hidden;
    }
    .btn-feishu:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(51,112,255,0.45);
      background: linear-gradient(135deg, #4d85ff, #3370ff);
    }
    .btn-feishu:active {
      transform: translateY(0);
    }
    .btn-feishu::after {
      content: ''; position: absolute;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }
    .btn-feishu:hover::after { opacity: 1; }

    .btn-feishu svg {
      width: 22px; height: 22px; flex-shrink: 0;
    }

    /* ── 加载态 ── */
    .loading-state { display: none; }
    .loading-state.active { display: block; }

    .spinner {
      display: inline-block; width: 36px; height: 36px;
      border: 3px solid rgba(148,163,184,0.15);
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: #94a3b8; font-size: 14px; }

    /* ── 错误态 ── */
    .error-state { display: none; }
    .error-state.active { display: block; }
    .error-msg {
      color: #f87171;
      font-size: 13px;
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.20);
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 16px;
      word-break: break-all;
    }
    .btn-retry {
      background: rgba(148,163,184,0.15);
      color: #94a3b8;
      border: 1px solid rgba(148,163,184,0.10);
      padding: 8px 20px; border-radius: 8px;
      cursor: pointer; font-size: 13px;
      transition: all 0.2s;
    }
    .btn-retry:hover {
      background: rgba(148,163,184,0.25);
      color: #cbd5e1;
    }

    /* ── 页脚信息 ── */
    .footer-info {
      font-size: 12px; color: #475569;
      text-align: center; line-height: 1.8;
    }
    .footer-info a { color: #60a5fa; text-decoration: none; }
    .footer-info a:hover { text-decoration: underline; }

    /* ── 响应式 ── */
    @media (max-width: 480px) {
      .login-card { width: calc(100% - 32px); padding: 36px 24px; }
    }
  </style>
</head>
<body>

  <!-- 多层光晕背景 -->
  <div class="bg-aura"></div>

  <!-- 星云粒子 Canvas -->
  <canvas id="particles-canvas"></canvas>

  <!-- 主容器 -->
  <div class="container">
    <div class="login-card">

      <!-- 正常登录状态 -->
      <div id="state-login">
        <div class="logo-icon">📊</div>
        <h1>考勤晾晒平台</h1>
        <p class="subtitle">
          使用飞书账号登录后<br>查看你负责区域的考勤数据
        </p>
        <button class="btn-feishu" id="btn-login" onclick="handleLogin()">
          <svg viewBox="0 0 24 24" fill="white">
            <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
          </svg>
          飞书账号登录
        </button>
      </div>

      <!-- 加载状态 -->
      <div id="state-loading" class="loading-state">
        <div class="spinner"></div>
        <p class="loading-text" id="loading-msg">正在验证登录状态...</p>
      </div>

      <!-- 错误状态 -->
      <div id="state-error" class="error-state">
        <div class="logo-icon" style="background: linear-gradient(135deg, #ef4444, #dc2626); font-size: 28px;">⚠️</div>
        <h1 style="color: #f87171;">连接失败</h1>
        <div class="error-msg" id="error-msg"></div>
        <button class="btn-retry" onclick="initAuth()">重新连接</button>
      </div>

    </div>

    <!-- 页脚信息 -->
    <div class="footer-info">
      仅限授权人员访问 &nbsp;|&nbsp;
      <a href="https://open.feishu.cn" target="_blank">飞书开放平台</a>
    </div>
  </div>

  <!-- ═══════════════════════════════════════════════════
       JavaScript — 认证逻辑
       ═══════════════════════════════════════════════════ -->
  <script>
    // ══ 配置 — 部署时修改此处的后端地址 ══
    var SSO_BACKEND_URL = 'http://localhost:3000';

    // ══ 状态切换 ══
    function showState(state) {
      ['login', 'loading', 'error'].forEach(function(s) {
        document.getElementById('state-' + s).classList.remove('active');
      });
      var el = document.getElementById('state-' + state);
      if (el) el.classList.add('active');
    }

    function setLoading(msg) {
      document.getElementById('loading-msg').textContent = msg;
      showState('loading');
    }

    function setError(msg) {
      document.getElementById('error-msg').textContent = msg;
      showState('error');
    }

    // ══ 飞书登录 ══
    function handleLogin() {
      setLoading('正在跳转到飞书授权页...');
      window.location.href = SSO_BACKEND_URL + '/api/auth/feishu';
    }

    // ══ 验证登录状态 ══
    async function initAuth() {
      showState('loading');
      setLoading('正在验证登录状态...');

      var token = localStorage.getItem('token');
      if (!token) {
        showState('login');
        return;
      }

      try {
        var res = await fetch(SSO_BACKEND_URL + '/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + token }
        });

        if (!res.ok) {
          // token 无效或过期
          localStorage.removeItem('token');
          localStorage.removeItem('user');
          showState('login');
          return;
        }

        var user = await res.json();
        setLoading('已登录，正在跳转...');

        // 更新 localStorage 中的用户信息
        localStorage.setItem('user', JSON.stringify(user));

        // 根据权限跳转到首页
        setTimeout(function() {
          var pages = user.pages || [];
          if (pages.includes('home')) {
            window.location.href = 'home.html';
          } else if (user.page_files && user.page_files.length > 0) {
            window.location.href = user.page_files[0];
          } else {
            window.location.href = 'home.html';
          }
        }, 600);

      } catch (err) {
        // 网络错误，后端未启动
        setError(
          '无法连接到认证服务，请确认后端已启动。\n\n' +
          '后端地址: ' + SSO_BACKEND_URL + '\n' +
          '错误: ' + (err.message || '网络不可达')
        );
      }
    }

    // ══ 星云粒子动画 ══
    (function() {
      var canvas = document.getElementById('particles-canvas');
      var ctx = canvas.getContext('2d');
      var particles = [];
      var PARTICLE_COUNT = 120;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      for (var i = 0; i < PARTICLE_COUNT; i++) {
        var angle = Math.random() * Math.PI * 2;
        var radius = 30 + Math.random() * 400;
        particles.push({
          x: canvas.width / 2 + Math.cos(angle) * radius,
          y: canvas.height / 2 + Math.sin(angle) * radius * 0.6,
          size: Math.random() * 1.5 + 0.5,
          speedX: (Math.random() - 0.5) * 0.3,
          speedY: (Math.random() - 0.5) * 0.2,
          alpha: Math.random() * 0.5 + 0.2,
          hue: [210, 230, 260, 170][Math.floor(Math.random() * 4)]
        });
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        for (var i = 0; i < particles.length; i++) {
          var p = particles[i];
          p.x += p.speedX;
          p.y += p.speedY;

          // 边界循环
          if (p.x < -50) p.x = canvas.width + 50;
          if (p.x > canvas.width + 50) p.x = -50;
          if (p.y < -50) p.y = canvas.height + 50;
          if (p.y > canvas.height + 50) p.y = -50;

          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = 'hsla(' + p.hue + ', 60%, 65%, ' + (p.alpha * 0.5) + ')';
          ctx.fill();
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ══ 页面加载 ══
    initAuth();
  </script>

</body>
</html>
